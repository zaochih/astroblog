# 友情链接 / Friend Links
# ─────────────────────────
# name:        显示名称
# description: 一句话描述
# url:         主链接
# pinned:      可选，true 时置顶显示
# sponsored:   可选，true 时标记为赞助链接，并输出 rel="sponsored"
# referral:    可选，true 时标记为推介链接，并按书写顺序显示在最后
# startAt:     可选，仅 sponsored/referral 生效；ISO 8601 开始时间，开始前隐藏
# endAt:       可选，仅 sponsored/referral 生效；ISO 8601 结束时间，结束后隐藏
# backgroundIcon:
#              可选，装饰用图片 URL；只用于卡片背景模糊光晕，不作为可见 icon 显示
# i18n:        可选，按语言覆盖 name / description / url / links / backgroundIcon
#   en-us:
#     name: Localized Name
#     description: Localized description
#     backgroundIcon: /path/to/localized-icon.png
# links:       可选，子链接列表
#   - icon: HugeIcon 名称 (home / image / globe / link / paperclip / rss / github / mail / pen)
#     url:  子链接地址

